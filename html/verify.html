<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
  <title>SchoolMap — Verify Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Kalam:wght@300;400;700&family=Patrick+Hand&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/style.css" />
</head>
<body>
  <div class="page">
    <div class="auth-page">
      <div class="wobbly-card wobbly-card-white tape-decoration rotate-n1 auth-card">
        <div class="auth-card-header">
          <div class="auth-card-icon" style="background:#192A57">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="white" stroke-width="2"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
          </div>
          <h1 class="auth-title">Administrator Verification</h1>
          <p id="verify-instructions" class="auth-subtitle">Enter the code sent to your email to continue.</p>
        </div>
        <form id="verify-form" class="auth-form" novalidate>
          <div class="field-group">
            <label for="verify-code" class="field-label">Verification Code</label>
            <input type="text" id="verify-code" class="wobbly-input" placeholder="Enter 6-character code" maxlength="6" required />
          </div>
          <div id="verify-sent-info" class="field-error" style="min-height:20px; color:#2d2d2d; padding-top:4px;"></div>
          <div id="verify-error" class="error-box" style="display:none"></div>
          <button type="submit" class="wobbly-btn wobbly-btn-primary w-full">Verify</button>
          <button type="button" id="resend-code" class="wobbly-btn wobbly-btn-secondary w-full">Resend Code</button>
          <a class="text-link" href="login.html">Back to Login</a>
        </form>
      </div>
    </div>
  </div>
  <div id="toast" class="toast" style="display:none"></div>
  <script src="../assets/js/core.js"></script>
  <script src="../assets/js/verify.js"></script>
</body>
</html>
