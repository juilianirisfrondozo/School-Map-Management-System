<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
  <title>SchoolMap — Logout Visit Log</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Kalam:wght@300;400;700&family=Patrick+Hand&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/style.css" />
</head>
<body>
  <div class="page">
    <div class="auth-page">
      <div class="wobbly-card wobbly-card-white tape-decoration rotate-n1 auth-card">
        <div class="auth-card-header">
          <div class="auth-card-icon" style="background:#192A57">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="white" stroke-width="2"><path d="M6 12h12"/><path d="M12 6v12"/></svg>
          </div>
          <h1 class="auth-title">Logout Visit Log</h1>
          <p class="auth-subtitle">Confirm logout and record your time-out.</p>
        </div>
        <form id="logout-form" class="auth-form" novalidate>
          <div class="field-group">
            <label for="logout-fullname" class="field-label">Full Name</label>
            <input type="text" id="logout-fullname" class="wobbly-input" placeholder="Your full name" required />
          </div>
          <div class="field-group">
            <label for="logout-email" class="field-label">Email</label>
            <input type="email" id="logout-email" class="wobbly-input" readonly />
          </div>
          <div class="field-group">
            <label for="logout-timeout" class="field-label">Time-out</label>
            <input type="text" id="logout-timeout" class="wobbly-input" readonly />
          </div>
          <div id="logout-error" class="error-box" style="display:none"></div>
          <button type="submit" class="wobbly-btn wobbly-btn-primary w-full">Submit</button>
          <a class="text-link" href="map.html">Return to Map</a>
        </form>
      </div>
    </div>
  </div>
  <div id="toast" class="toast" style="display:none"></div>
  <script src="../assets/js/core.js"></script>
  <script src="../assets/js/logout.js"></script>
</body>
</html>
