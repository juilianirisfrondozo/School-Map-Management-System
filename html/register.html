<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
  <title>SchoolMap — Register</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Kalam:wght@300;400;700&family=Patrick+Hand&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/style.css" />
</head>
<body>

  <!-- ===================================================
       PAGE: REGISTER
  ==================================================== -->
  <div id="page-register" class="page">
    <div class="auth-page">
      <button class="logo-btn" onclick="window.location.href='index.html'" style="margin-bottom:32px">
        <div class="logo-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="white" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
        </div>
        <span class="logo-text">SchoolMap</span>
      </button>
      <div class="wobbly-card wobbly-card-white tack-decoration rotate-1 auth-card">
        <div class="auth-card-header">
          <div class="auth-card-icon" style="background:#8F3347">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="white" stroke-width="2"><path d="M16 21v-2a4 4 0 00-4-4H6a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
          </div>
          <h1 class="auth-title">Create Account</h1>
          <p class="auth-subtitle">Join SchoolMap today!</p>
        </div>
        <form id="register-form" onsubmit="handleRegister(event)" class="auth-form">
          <div class="field-group">
            <label for="reg-fullname" class="field-label">Full Name</label>
            <input type="text" id="reg-fullname" class="wobbly-input" placeholder="Juan dela Cruz" required />
            <span id="err-fullname" class="field-error"></span>
          </div>
          <div class="field-group">
            <label for="reg-email" class="field-label">Email</label>
            <input type="email" id="reg-email" class="wobbly-input" placeholder="your@email.edu" required />
            <span id="err-email" class="field-error"></span>
          </div>
          <div class="field-group">
            <label for="reg-username" class="field-label">Course</label>
            <input type="text" id="reg-username" class="wobbly-input" placeholder="BSIT" required />
            <span id="err-username" class="field-error"></span>
          </div>
          <div class="field-group">
            <label class="field-label">Register as</label>
            <div class="role-buttons">
              <button type="button" class="role-btn active" onclick="selectRole('student', this)">student</button>
              <button type="button" class="role-btn" onclick="selectRole('faculty', this)">faculty</button>
              <button type="button" class="role-btn" onclick="selectRole('visitor', this)">visitor</button>
            </div>
            <input type="hidden" id="reg-role" value="student" />
          </div>
          <div class="field-group" style="position:relative">
            <label for="reg-password" class="field-label">Password</label>
            <input type="password" id="reg-password" class="wobbly-input" placeholder="Min. 6 characters" required />
            <button type="button" class="pw-toggle" onclick="togglePasswordVisibility('reg-password', this)">
              <svg class="eye-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
            <span id="err-password" class="field-error"></span>
          </div>
          <div class="field-group">
            <label for="reg-confirm" class="field-label">Confirm Password</label>
            <input type="password" id="reg-confirm" class="wobbly-input" placeholder="Repeat password" required />
            <span id="err-confirm" class="field-error"></span>
          </div>
          <button type="submit" id="register-submit" class="wobbly-btn wobbly-btn-primary w-full" style="margin-top:8px">Register</button>
        </form>
        <div class="auth-links">
          <hr class="auth-hr" />
          <p class="auth-switch-text">Already have an account?</p>
          <button class="wobbly-btn wobbly-btn-secondary w-full" onclick="window.location.href='login.html'">Sign In</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast Notification -->
  <div id="toast" class="toast" style="display:none"></div>

  <script src="../assets/js/core.js"></script>
  <script src="../assets/js/register.js"></script>
  <script>
    function selectRole(role, btn) {
      document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('reg-role').value = role;
    }

    function togglePasswordVisibility(inputId, btn) {
      const input = document.getElementById(inputId);
      if (input.type === 'password') {
        input.type = 'text';
        btn.querySelector('.eye-icon').style.opacity = '0.4';
      } else {
        input.type = 'password';
        btn.querySelector('.eye-icon').style.opacity = '1';
      }
    }

    function handleRegister(e) {
      e.preventDefault();

      // Clear errors
      ['fullname','email','username','password','confirm'].forEach(f => {
        document.getElementById('err-' + f).textContent = '';
      });

      const fullname = document.getElementById('reg-fullname').value.trim();
      const email    = document.getElementById('reg-email').value.trim();
      const username = document.getElementById('reg-username').value.trim();
      const role     = document.getElementById('reg-role').value;
      const password = document.getElementById('reg-password').value;
      const confirm  = document.getElementById('reg-confirm').value;

      let valid = true;

      if (fullname.length < 2) {
        document.getElementById('err-fullname').textContent = 'Please enter your full name.';
        valid = false;
      }
      if (!/\S+@\S+\.\S+/.test(email)) {
        document.getElementById('err-email').textContent = 'Enter a valid email.';
        valid = false;
      }
      if (username.length < 3) {
        document.getElementById('err-username').textContent = 'Username must be at least 3 characters.';
        valid = false;
      }
      if (password.length < 6) {
        document.getElementById('err-password').textContent = 'Password must be at least 6 characters.';
        valid = false;
      }
      if (password !== confirm) {
        document.getElementById('err-confirm').textContent = 'Passwords do not match.';
        valid = false;
      }

      if (!valid) return;

      // Save user to localStorage (demo)
      const users = JSON.parse(localStorage.getItem('schoolmap_users') || '[]');
      if (users.find(u => u.email === email)) {
        document.getElementById('err-email').textContent = 'Email already registered.';
        return;
      }
      if (users.find(u => u.username === username)) {
        document.getElementById('err-username').textContent = 'Username already taken.';
        return;
      }

      users.push({ fullname, email, username, role, password });
      localStorage.setItem('schoolmap_users', JSON.stringify(users));
      localStorage.setItem('schoolmap_user', JSON.stringify({ name: fullname, role, username }));

      const btn = document.getElementById('register-submit');
      btn.textContent = '✓ Account created!';
      setTimeout(() => window.location.href = 'map.html', 700);
    }
  </script>
</body>
</html>
