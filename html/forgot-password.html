<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
  <title>SchoolMap — Reset Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Kalam:wght@300;400;700&family=Patrick+Hand&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/style.css" />
</head>
<body>

  <!-- ===================================================
       PAGE: FORGOT PASSWORD
  ==================================================== -->
  <div id="page-forgot-password" class="page">
    <div class="auth-page">
      <button class="logo-btn" onclick="window.location.href='index.html'" style="margin-bottom:32px">
        <div class="logo-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="white" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
        </div>
        <span class="logo-text">SchoolMap</span>
      </button>
      <div class="wobbly-card wobbly-card-white tape-decoration rotate-n1 auth-card">
        <div class="auth-card-header">
          <div class="auth-card-icon" style="background:#C24322">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="white" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
          </div>
          <h1 class="auth-title">Reset Password</h1>
          <p class="auth-subtitle">Enter your email to receive a reset link</p>
        </div>
        <div id="forgot-form-container">
          <form id="forgot-form" onsubmit="handleForgotPassword(event)" class="auth-form">
            <div class="field-group">
              <label for="forgot-email" class="field-label">Email Address</label>
              <input type="email" id="forgot-email" class="wobbly-input" placeholder="your@email.edu" required />
              <span id="err-forgot-email" class="field-error"></span>
            </div>
            <button type="submit" id="forgot-submit" class="wobbly-btn wobbly-btn-primary w-full">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
              Send Reset Link
            </button>
          </form>
        </div>
        <div id="forgot-success" style="display:none; text-align:center; padding:16px 0">
          <div class="auth-card-icon" style="background:#15803d; margin:0 auto 12px">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="white" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          </div>
          <p class="card-body">✓ Reset link sent! Check your email for instructions.</p>
          <p style="font-size:12px; color:#2d2d2d88; margin-top:8px">(Demo mode — no actual email is sent)</p>
        </div>
        <div class="auth-links">
          <a class="text-link" href="login.html">← Back to Login</a>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast Notification -->
  <div id="toast" class="toast" style="display:none"></div>

  <script src="../assets/js/core.js"></script>
  <script src="../assets/js/forgot-password.js"></script>
  <script>
    function handleForgotPassword(e) {
      e.preventDefault();
      const email = document.getElementById('forgot-email').value.trim();
      const errEl = document.getElementById('err-forgot-email');
      errEl.textContent = '';

      if (!/\S+@\S+\.\S+/.test(email)) {
        errEl.textContent = 'Please enter a valid email address.';
        return;
      }

      const btn = document.getElementById('forgot-submit');
      btn.disabled = true;
      btn.textContent = 'Sending...';

      // Simulate sending (demo)
      setTimeout(() => {
        document.getElementById('forgot-form-container').style.display = 'none';
        document.getElementById('forgot-success').style.display = 'block';
      }, 1000);
    }
  </script>
</body>
</html>
